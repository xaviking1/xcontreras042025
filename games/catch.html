<!doctype html>
<html>
  <head>
    <title>Catch the Box</title>
    <style>
      body {
        background: #222;
        margin: 0;
      }

      #box {
        width: 50px;
        height: 50px;
        background: red;
        position: absolute;
      }
    </style>
  </head>

  <body>
    <div id="box"></div>

    <script>
      let box = document.getElementById("box");

      function moveBox() {
        let x = Math.random() * window.innerWidth;
        let y = Math.random() * window.innerHeight;

        box.style.left = x + "px";
        box.style.top = y + "px";
      }

      box.addEventListener("click", moveBox);

      moveBox();
    </script>
  </body>
</html>
