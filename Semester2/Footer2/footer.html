<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>

/* Mobile Styles */
body{
    font-family: Arial, sans-serif;
    background-color: antiquewhite;
    color: rgb(101, 126, 148);
    line-height: 1.7;
}

h1 {
    text-align: center;
    color: rgb(101, 126, 148);
    padding: 1rem;
}

#pagefooter {
    border-top: 1px solid silver;
    background-color: rgb(225, 215, 202);
    padding: 1rem;
    margin: 0;
    text-align: center;
}


#pagefooter > p {
    color: #555;
    text-decoration: none;
    border: 1px solid silver;
}



#pagefooter article {
    margin-top: 10px;
    font-size: 1em;
    color: #777;
    border: 1px solid silver;
}

/* Icon Styles */

i {
    color: rgb(101, 126, 148);
    margin-right: 5px;
    font-size: 1.2rem;
}

i.fa-heart {
    color: red;
}


@media screen and (max-width: 768px) {
    body {
        font-size: 14px;
    }

    #pagefooter {
        padding: 0.5rem;
    }

    i {
        font-size: 1rem;
    }
    
}

</style>


</head>
<body>
    <h1>Footer</h1>
    <footer id="pagefooter">
        <p>
            <i class="fa-solid fa-paw"></i>Paws and Wiskers Animal Shelter <br>
            Made with <i class="fa-solid fa-heart"></i> for animals <br>

            <article>
           <i class="fa-solid fa-phone"></i>555-555-5555 <br>
                <i class="fa-solid fa-map-pin"></i>1234 Main Street <br>
                <i class="fa-solid fa-envelope"></i>info@pawsandwiskers.org
            </article>

        </p>
    


    </footer>
</body>
</html>
