      .gallery {
        background-color: navy;

        max-width: 1280px;
        margin: auto;

      figcaption {

        font-style: italic;
        color: #333;
        padding: 0.5rem;
      }

      img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
      }
    </style>
  </head>
