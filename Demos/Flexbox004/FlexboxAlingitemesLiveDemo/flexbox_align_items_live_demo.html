<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Align Items Live Demo</title>

    <style>
      #flexparent {
        width: 600px;
        height: 600px;
        background-color: lightblue;
        flex-direction: column;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* when flex-direction is row, align-items will align the children vertically and justify-content will align the children horizontally. when flex-direction is column, align-items will align the children horizontally and justify-content will align the children vertically. */
      .flexchildren {
        height: 50px;
        width: 50px;
        background-color: lightcoral;
        border: 1px solid black;
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Flexbox Align Items Live Demo</h1>
    <div id="flexparent">
      <div class="flexchildren">child1</div>
      <div class="flexchildren">child2</div>
      <div class="flexchildren">child3</div>
      <div class="flexchildren">child4</div>
    </div>
  </body>
</html>
